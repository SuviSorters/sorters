<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>The Mountain Sorter</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&family=Rampart+One&family=Satisfy&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script> 
    
    <style type="text/css">
    :root {
        /* FONT STYLES */
        --header-font: "Rampart One", sans-serif;
        --body-font: 'Comfortaa', sans-serif;
        --header-size: 4rem;
        --header-weight: 800;

        /* COLORS */
        --bg-color: #1c1c1c;
        --header-color: #eec454;
        --battle-num-color: #eec454;
        --glow-color: #eec454;
        
        /* MIDDLE BUTTONS */
        --btn-bg: #1c1c1c;
        --btn-text: #eec454;
        --btn-hover-bg: #4A8273;
        --btn-hover-text: #eec454;
        --btn-outline: #eec454;

        /* TEXT SECTIONS */
        --instr-color: #bbbbbb;
        --note-color: #4A8273;

        /* IMAGES */
        --album-cover: url('https://upload.wikimedia.org/wikipedia/en/d/de/Gorillaz_-_The_Mountain.png');
        
        /* LOGO SETUP */
        --logo-link: url("https://images-wixmp-ed30a86b8c4ca887773594c2.wixmp.com/f/64ecef39-bee4-4348-aee6-0909c8bcfa5f/dd7i232-90045d68-267e-49be-a950-e51eff2157a6.png?token=eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJ1cm46YXBwOjdlMGQxODg5ODIyNjQzNzNhNWYwZDQxNWVhMGQyNmUwIiwiaXNzIjoidXJuOmFwcDo3ZTBkMTg4OTgyMjY0MzczYTVmMGQ0MTVlYTBkMjZlMCIsIm9iaiI6W1t7InBhdGgiOiIvZi82NGVjZWYzOS1iZWU0LTQzNDgtYWVlNi0wOTA5YzhiY2ZhNWYvZGQ3aTIzMi05MDA0NWQ2OC0yNjdlLTQ5YmUtYTk1MC1lNTFlZmYyMTU3YTYucG5nIn1dXSwiYXVkIjpbInVybjpzZXJ2aWNlOmZpbGUuZG93bmxvYWQiXX0.eDQSE96LacpD3s0x7kao88NBVOmFqalY5_7aCHpWTtQ");
        --logo-width: 400px;
        --logo-height: 50px;
    }

    body { 
        background-color: var(--bg-color); 
        color: var(--header-color); 
        font-family: var(--body-font); 
        text-align: center; 
    }

    /* THE LOGO */
    .main-logo {
        width: var(--logo-width);
        height: var(--logo-height);
        background-image: var(--logo-link);
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        margin: 0 auto 20px auto;
        display: block;
    }

    h1.album-title {
        font-family: var(--header-font);
        font-weight: var(--header-weight);
        font-size: var(--header-size);
        margin-top: 0;
        margin-bottom: 5px;
    }

    #battleNumber { 
        font-size: 20px; 
        color: var(--battle-num-color); 
        padding-bottom: 20px; 
    }

    #leftField, #rightField {
        font-family: "Rampart One";
        width: 250px; height: 250px; display: table-cell; 
        vertical-align: middle; text-align: center;
        border-radius: 40px; 
        background-image: var(--album-cover);
        background-size: cover; background-position: center; 
        position: relative; cursor: pointer;
        font-size: 35px; font-weight: 800; 
        color: #ffffff !important; text-shadow: 0 0 10px #000; 
        z-index: 5; transition: 0.3s;
    }

    #leftField:hover, #rightField:hover { 
        transform: scale(1.03); 
        box-shadow: 0 0 30px var(--glow-color); 
    }

    #leftField::before, #rightField::before {
        content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
        background: rgba(0,0,0,0.5); border-radius: 40px; z-index: -1;
    }

    .middleField {
        width: 150px; height: 80px; 
        border: 4px solid var(--btn-outline); border-radius: 20px; 
        background: var(--btn-bg); color: var(--btn-text); 
        cursor: pointer; transition: 0.3s;
    }

    .middleField:hover { 
        background: var(--btn-hover-bg); 
        color: var(--btn-hover-text); 
    }
    
    .spotify-preview { margin-top: 15px; border-radius: 12px; display: block; margin-left: auto; margin-right: auto; transition: 0.3s; }
    .spotify-preview:hover { box-shadow: 0 0 20px var(--glow-color); }

    #download-btn {
        margin: 20px auto;
        padding: 10px 25px;
        background: var(--btn-bg);
        color: #eec454;
        border: 2px solid #eec454;
        border-radius: 10px;
        font-family: Comfortaa;
        cursor: pointer;
        display: none; /* Hidden until results show */
    }
    #download-btn:hover {
        background: #4A8273;
        color: #eec454;
    }

    .header-container { margin: 40px 0; }
    .instructions-text { color: var(--instr-color); font-size: 16px; }
    .note { color: var(--note-color); font-style: italic; display: block; margin-top: 10px; }
    #mainTable { margin: 40px auto; border-spacing: 20px; }
    </style>

    <script type="text/javascript">
        // 2. SONG LIST SETUP
        var namMember = [
            {name: "The Mountain", id:"3MebYJnEDK4XdnCj3VMLjL"},
            {name: "The Moon Cave", id:"6VflG4mpZSlpKnqNRL3NO9"},
            {name: "The Happy Dictator", id:"4JbyNMvp3BqVILVy4Bbevf"},
            {name: "The Hardest Thing", id:"2jSbuzSLLvFYO7xAMEU85i"},
            {name: "Orange County", id:"4HnBNOfnPYCgRzB1dcAi3x"},
            {name: "The God of Lying", id:"5nrbuDZe5Hod1nUsND6QUA"},
            {name: "The Empty Dream Machine", id:"5FH7DTLl8WQNkZs00Cb3EM"},
            {name: "The Manifesto", id:"1WUBWl3jNNYo0hrPTrA5D0"},
            {name: "The Plastic Guru", id:"68nwsIBVoGDO38VKhtvKzD"},
            {name: "Delirium", id:"4uIXvy8PbYLEhs0PZgaP8p"},
            {name: "Damascus", id:"5eZVQYGpyXkeEVMhbpDhPB"},
            {name: "The Shadowy Light", id:"1WHBtgrgSKDJd9Y8vHNZqH"},
            {name: "Casablanca", id:"4PjP7VfSAPxyt2TprUpALA"},
            {name: "The Sweet Prince", id:"5Wmek5wAmAcuEcjHa0YOzg"},
            {name: "The Sad God", id:"5pMMyQyob7rjYO9y8lD7Ey"}
        ];

        // === Logic Engine (No need to edit) ---
        var lstMember = [], parent = [], equal = [], rec = [];
        var cmp1, cmp2, head1, head2, nrec, numQuestion, totalSize, finishSize, finishFlag = 0;

        function initList(){
            var n = 0, mid, i;
            lstMember[n] = [];
            for (i=0; i<namMember.length; i++) { lstMember[n][i] = i; }
            parent[n] = -1; totalSize = 0; n++;
            for (i=0; i<lstMember.length; i++) {
                if(lstMember[i].length>=2) {
                    mid = Math.ceil(lstMember[i].length/2);
                    lstMember[n] = lstMember[i].slice(0,mid); totalSize += lstMember[n].length; parent[n] = i; n++;
                    lstMember[n] = lstMember[i].slice(mid,lstMember[i].length); totalSize += lstMember[n].length; parent[n] = i; n++;
                }
            }
            for (i=0; i<namMember.length; i++) { rec[i] = 0; }
            nrec = 0;
            for (i=0; i<=namMember.length; i++) { equal[i] = -1; }
            cmp1 = lstMember.length-2; cmp2 = lstMember.length-1;
            head1 = 0; head2 = 0; numQuestion = 1; finishSize = 0;
        }

        function sortList(flag){
            if (finishFlag) return;
            if (flag<0) {
                rec[nrec] = lstMember[cmp1][head1]; head1++; nrec++; finishSize++;
                while (equal[rec[nrec-1]]!=-1) { rec[nrec] = lstMember[cmp1][head1]; head1++; nrec++; finishSize++; }
            } else if (flag>0) {
                rec[nrec] = lstMember[cmp2][head2]; head2++; nrec++; finishSize++;
                while (equal[rec[nrec-1]]!=-1) { rec[nrec] = lstMember[cmp2][head2]; head2++; nrec++; finishSize++; }
            } else {
                rec[nrec] = lstMember[cmp1][head1]; head1++; nrec++; finishSize++;
                while (equal[rec[nrec-1]]!=-1) { rec[nrec] = lstMember[cmp1][head1]; head1++; nrec++; finishSize++; }
                equal[rec[nrec-1]] = lstMember[cmp2][head2];
                rec[nrec] = lstMember[cmp2][head2]; head2++; nrec++; finishSize++;
                while (equal[rec[nrec-1]]!=-1) { rec[nrec] = lstMember[cmp2][head2]; head2++; nrec++; finishSize++; }
            }
            if (head1<lstMember[cmp1].length && head2==lstMember[cmp2].length) {
                while (head1<lstMember[cmp1].length){ rec[nrec] = lstMember[cmp1][head1]; head1++; nrec++; finishSize++; }
            } else if (head1==lstMember[cmp1].length && head2<lstMember[cmp2].length) {
                while (head2<lstMember[cmp2].length){ rec[nrec] = lstMember[cmp2][head2]; head2++; nrec++; finishSize++; }
            }
            if (head1==lstMember[cmp1].length && head2==lstMember[cmp2].length) {
                for (var i=0; i<lstMember[cmp1].length+lstMember[cmp2].length; i++) { lstMember[parent[cmp1]][i] = rec[i]; }
                lstMember.pop(); lstMember.pop();
                cmp1 -= 2; cmp2 -= 2; head1 = 0; head2 = 0;
                if (head1==0 && head2==0) { for (i=0; i<namMember.length; i++) { rec[i] = 0; } nrec = 0; }
            }
            if (cmp1<0) {
                document.getElementById("battleNumber").innerHTML = "Showdown #"+(numQuestion-1)+"<br>100% sorted.";
                showResult(); finishFlag = 1;
            } else { showImage(); }
        }

        function showResult() {
                        var ranking = 1, sameRank = 1, str = "", i;
            // (below function showResult var ranking : 3. Wrapped table in a div for cleaner image capture
            str += "<div id='captureArea' style='background:var(--bg-color); padding: 20px; display:inline-block;'>";
            str += "<table style='width:350px; font-family:var(--body-font); color:#fff; margin:0 auto; border-collapse:collapse;'>";
            str += "<tr><td style='background:var(--btn-hover-bg); color:var(--btn-hover-text); padding:10px; border: 1px solid #444;'>Rank<\/td><td style='background:var(--btn-hover-bg); color:var(--btn-hover-text); padding:10px; border: 1px solid #444;'>Song<\/td><\/tr>";
            for (i=0; i<namMember.length; i++) {
                str += "<tr><td style='padding:10px; border: 1px solid #444;'>"+ranking+"<\/td><td style='padding:10px; border: 1px solid #444;'>"+namMember[lstMember[0][i]].name+"<\/td><\/tr>";
                if (i<namMember.length-1) {
                    if (equal[lstMember[0][i]]==lstMember[0][i+1]) { sameRank++; } else { ranking += sameRank; sameRank = 1; }
                }
            }
            str += "<\/table><\/div>";
            document.getElementById("resultField").innerHTML = str;
            document.getElementById("mainTable").style.display = "none";
            document.getElementById("download-btn").style.display = "block"; // Show download button
        }
            
        // (directly below #3) 4. Download Function
        function downloadImage() {
            const area = document.getElementById('captureArea');
            html2canvas(area, { backgroundColor: "#1c1c1c" }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'the-mountain-ranking.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        function skipQuestion() {
            if (finishFlag) return;
            var randomChoice = Math.random() < 0.5 ? -1 : 1;
            sortList(randomChoice);
        }

        function showImage() {
            var leftSong = namMember[lstMember[cmp1][head1]];
            var rightSong = namMember[lstMember[cmp2][head2]];

            document.getElementById("battleNumber").innerHTML = "Showdown #"+numQuestion+"<br>"+Math.floor(finishSize*100/totalSize)+"% sorted.";
            document.getElementById("leftField").innerHTML = leftSong.name;
            document.getElementById("rightField").innerHTML = rightSong.name;
            
            updatePlayer("leftPreview", leftSong.id);
            updatePlayer("rightPreview", rightSong.id);

            numQuestion++;
        }

        function updatePlayer(elementId, songId) {
            var player = document.getElementById(elementId);
            if (songId === "") {
                player.style.visibility = "hidden";
            } else {
                player.style.visibility = "visible";
                player.src = `https://open.spotify.com/embed/track/${songId}?utm_source=generator&theme=0`;
            }
        }
    </script>
</head>

<body>
<div class="header-container">
    <div class="main-logo"></div>
    <!-- 3. ALBUM TITLE -->
    <h1 class="album-title">The Mountain</h1>
    <p class="instructions-text">
        Select which song you like better to get an accurate list.<br>
        <span class="note">Note: Overusing 'no opinion' or 'I like both' can affect results.</span>
    </p>
</div>

<table id="mainTable" align="center">
    <tr><td id="battleNumber" colspan="3">Showdown #1<br>0% sorted.</td></tr>
    <tr>
        <td id="leftField" onclick="sortList(-1)"></td>
        <td class="middleField" onclick="sortList(0)">I like both</td>
        <td id="rightField" onclick="sortList(1)"></td>
    </tr>
    <tr id="preview-row">
        <td>
            <iframe id="leftPreview" class="spotify-preview" src="" width="300" height="80" frameborder="0" allowtransparency="true" allow="encrypted-media" style="border:none; overflow:hidden;"></iframe>
        </td>
        <td class="middleField" onclick="skipQuestion()">no opinion</td>
        <td>
            <iframe id="rightPreview" class="spotify-preview" src="" width="300" height="80" frameborder="0" allowtransparency="true" allow="encrypted-media" style="border:none; overflow:hidden;"></iframe>
        </td>
    </tr>
</table>
<div id="resultField"></div>
<button id="download-btn" onclick="downloadImage()">Download Results as Image</button>
<script type="text/javascript">
    initList();
    showImage();
</script>
