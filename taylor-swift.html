<!DOCTYPE html>
<html>
    <!-- 
    QUICK SEARCH & REPLACE GUIDE:
    CHANGE          -> Elements to change manually
    BACKGROUNDIMAGE -> Direct link to the album cover image
    COLOR1          -> Main accent (Results table header, "Showdown" text)
    COLOR2          -> Secondary accent (Buttons and Note text)
    COLOR3          -> Page background color
-->
<head>
<meta charset="utf-8">
<!-- CHANGE: TAB TITLE -->
<title>Taylor Swift Sorter</title>
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Cedarville+Cursive&display=swap" rel="stylesheet">

<script type="text/javascript">
    // -- CHANGE: SONG TITLES --
var namMember = ["Tim McGraw", "Picture To Burn", "Teardrops On My Guitar", "A Place In This World", "Cold As You", "The Outside", "Tied Together With A Smile", "Stay Beautiful", "Should've Said No", "Mary's Song (Oh My My My)", "Our Song", "I'm Only Me When I'm With You", "Invisible", "A Perfectly Good Heart", "Teardrops On My Guitar (Pop Version)"];
var lstMember = [], parent = [], equal = [], rec = [];
var cmp1, cmp2, head1, head2, nrec, numQuestion, totalSize, finishSize, finishFlag = 0;

function initList(){
    var n = 0, mid, i;
    lstMember[n] = [];
    for (i=0; i<namMember.length; i++) { lstMember[n][i] = i; }
    parent[n] = -1; totalSize = 0; n++;
    for (i=0; i<lstMember.length; i++) {
        if(lstMember[i].length>=2) {
            mid = Math.ceil(lstMember[i].length/2);
            lstMember[n] = lstMember[i].slice(0,mid); totalSize += lstMember[n].length; parent[n] = i; n++;
            lstMember[n] = lstMember[i].slice(mid,lstMember[i].length); totalSize += lstMember[n].length; parent[n] = i; n++;
        }
    }
    for (i=0; i<namMember.length; i++) { rec[i] = 0; }
    nrec = 0;
    for (i=0; i<=namMember.length; i++) { equal[i] = -1; }
    cmp1 = lstMember.length-2; cmp2 = lstMember.length-1;
    head1 = 0; head2 = 0; numQuestion = 1; finishSize = 0;
}

function sortList(flag){
    if (finishFlag) return;
    if (flag<0) {
        rec[nrec] = lstMember[cmp1][head1]; head1++; nrec++; finishSize++;
        while (equal[rec[nrec-1]]!=-1) { rec[nrec] = lstMember[cmp1][head1]; head1++; nrec++; finishSize++; }
    } else if (flag>0) {
        rec[nrec] = lstMember[cmp2][head2]; head2++; nrec++; finishSize++;
        while (equal[rec[nrec-1]]!=-1) { rec[nrec] = lstMember[cmp2][head2]; head2++; nrec++; finishSize++; }
    } else {
        rec[nrec] = lstMember[cmp1][head1]; head1++; nrec++; finishSize++;
        while (equal[rec[nrec-1]]!=-1) { rec[nrec] = lstMember[cmp1][head1]; head1++; nrec++; finishSize++; }
        equal[rec[nrec-1]] = lstMember[cmp2][head2];
        rec[nrec] = lstMember[cmp2][head2]; head2++; nrec++; finishSize++;
        while (equal[rec[nrec-1]]!=-1) { rec[nrec] = lstMember[cmp2][head2]; head2++; nrec++; finishSize++; }
    }
    if (head1<lstMember[cmp1].length && head2==lstMember[cmp2].length) {
        while (head1<lstMember[cmp1].length){ rec[nrec] = lstMember[cmp1][head1]; head1++; nrec++; finishSize++; }
    } else if (head1==lstMember[cmp1].length && head2<lstMember[cmp2].length) {
        while (head2<lstMember[cmp2].length){ rec[nrec] = lstMember[cmp2][head2]; head2++; nrec++; finishSize++; }
    }
    if (head1==lstMember[cmp1].length && head2==lstMember[cmp2].length) {
        for (var i=0; i<lstMember[cmp1].length+lstMember[cmp2].length; i++) { lstMember[parent[cmp1]][i] = rec[i]; }
        lstMember.pop(); lstMember.pop();
        cmp1 -= 2; cmp2 -= 2; head1 = 0; head2 = 0;
        if (head1==0 && head2==0) { for (i=0; i<namMember.length; i++) { rec[i] = 0; } nrec = 0; }
    }
    if (cmp1<0) {
        document.getElementById("battleNumber").innerHTML = "Showdown #"+(numQuestion-1)+"<br>100% sorted.";
        showResult(); finishFlag = 1;
    } else { showImage(); }
}

function showResult() {
    var ranking = 1, sameRank = 1, str = "", i;
    str += "<table style='width:300px; font-family:Comfortaa; color:#fff; margin:20px auto; border-collapse:collapse;'>";
    str += "<tr><td style='background:#a2c9a8; padding:10px;'>Rank<\/td><td style='background:#a2c9a8; padding:10px;'>Song<\/td><\/tr>";
    for (i=0; i<namMember.length; i++) {
        str += "<tr style='border-bottom:1px solid #444;'><td style='padding:10px;'>"+ranking+"<\/td><td style='padding:10px;'>"+namMember[lstMember[0][i]]+"<\/td><\/tr>";
        if (i<namMember.length-1) {
            if (equal[lstMember[0][i]]==lstMember[0][i+1]) { sameRank++; } else { ranking += sameRank; sameRank = 1; }
        }
    }
    str += "<\/table>";
    document.getElementById("resultField").innerHTML = str;
}

function skipQuestion() {
    if (finishFlag) return;
    // Math.random() picks a number between 0 and 1. 
    // If it's less than 0.5, we pick -1 (left). Otherwise, we pick 1 (right).
    var randomChoice = Math.random() < 0.5 ? -1 : 1;
    sortList(randomChoice);
}


function showImage() {
    document.getElementById("battleNumber").innerHTML = "Showdown #"+numQuestion+"<br>"+Math.floor(finishSize*100/totalSize)+"% sorted.";
    document.getElementById("leftField").innerHTML = namMember[lstMember[cmp1][head1]];
    document.getElementById("rightField").innerHTML = namMember[lstMember[cmp2][head2]];
    numQuestion++;
}
</script>

<style type="text/css">
body { background-color: #1c1c1c; color: #ffffff; font-family: 'Comfortaa', cursive; text-align: center; 
h1 {
    font-family: 'Cedarville Cursive', cursive;
    font-weight: 800;
    font-size: 4rem!important;
}

#mainTable { margin: 40px auto; border-spacing: 20px; }
#battleNumber { font-size: 20px; color: #147c88; padding-bottom: 20px; text-align: center; }
#leftField, #rightField {
    width: 250px; height: 250px; display: table-cell; vertical-align: middle; text-align: center;
    border-radius: 40px; 
    background-image: url('https://upload.wikimedia.org/wikipedia/en/1/1f/Taylor_Swift_-_Taylor_Swift.png');
    background-size: cover; background-position: center; position: relative; cursor: pointer;
    font-size: 26px; font-weight: 800; 
        /* -- CHANGE: Optional Song Title Color -- */
    color: #FFFFFF !important; text-shadow: 0 0 10px #000; z-index: 5; transition: 0.3s;
}
#leftField:hover, #rightField:hover { transform: scale(1.03); box-shadow: 0 0 
/* -- CHANGE: RGB format of COLOR1 -- */
    30px rgba(20, 124, 136, 0.6); }
#leftField::before, #rightField::before {
    content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); border-radius: 40px; z-index: -1;
}
.middleField {
    /* -- CHANGE: Border Color of Middle Button */
    width: 150px; height: 80px; border: 2px solid #091a0a; border-radius: 20px; background: #a2c9a8; 
    /* -- CHANGE: Color of Middle Button Text -- */
    color: #091a0a; cursor: pointer; transition: 0.3s;
}
/* CHANGE: Hover Color of Middle Button */
.middleField:hover { background: #147c88; color: #ffffff; }
.header-container { margin: 50px 0; }
.album-title { font-size: 42px; letter-spacing: 4px; margin-bottom: 5px; }
/* "select which song..." Color */
.instructions-text { color: #a2c9a8; font-size: 16px; }
.note { color: #a2c9a8; font-style: italic; display: block; margin-top: 10px; }
</style>
</head>

<body>
<div class="header-container">
    <!-- CHANGE: Album Title -->
    <h1 class="album-title">Taylor Swift</h1>
    <p class="instructions-text">
        Select which song you like better to get an accurate list.<br>
        <span class="note">Note: Overusing 'no opinion' or 'I like both' can affect results.</span>
    </p>
</div>

<table id="mainTable" align="center">
    <tr><td id="battleNumber" colspan="3">Showdown #1<br>0% sorted.</td></tr>
    <tr>
        <td id="leftField" onclick="sortList(-1)"></td>
        <td class="middleField" onclick="sortList(0)">I like both</td>
        <td id="rightField" onclick="sortList(1)"></td>
    </tr>
    <tr>
        <td></td>
        <td class="middleField" onclick="skipQuestion()">no opinion</td>
        <td></td>
    </tr>
</table>
<div id="resultField"></div>

<script type="text/javascript">
initList();
showImage();
</script>
</body>
</html>
